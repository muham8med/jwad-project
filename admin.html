<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JAHA PERFUME'S | Admin Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --gold: #d4af37;
    --dark-gold: #8f6b10;
    --black: #050505;
    --card: #111111;
    --text: #f5f5f5;
    --muted: #999;
    --red: #e74c3c;
    --green: #27ae60;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Poppins', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
}
/* LOGIN */
.login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    gap: 20px;
}
.login-screen h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 32px;
    letter-spacing: 3px;
}
.login-screen input {
    padding: 14px 20px;
    border-radius: 30px;
    border: 1px solid rgba(212,175,55,0.3);
    background: #111;
    color: white;
    font-size: 15px;
    width: 280px;
    max-width: 90%;
    outline: none;
    text-align: center;
}
.login-screen input:focus { border-color: var(--gold); }
.login-screen button {
    padding: 12px 40px;
    border: none;
    border-radius: 30px;
    background: var(--gold);
    color: black;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}
.login-screen button:hover { background: #f1cb55; }
.login-error { color: var(--red); font-size: 14px; display: none; }
.hidden { display: none !important; }
/* ADMIN LAYOUT */
.admin-layout {
    display: flex;
    min-height: 100vh;
}
.sidebar {
    width: 220px;
    background: #0a0a0a;
    border-right: 1px solid rgba(212,175,55,0.1);
    padding: 30px 0;
    flex-shrink: 0;
}
.sidebar h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 18px;
    text-align: center;
    padding: 0 20px 20px;
    border-bottom: 1px solid rgba(212,175,55,0.1);
    margin-bottom: 15px;
    letter-spacing: 1px;
}
.sidebar a {
    display: block;
    padding: 12px 24px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
    border-left: 3px solid transparent;
}
.sidebar a:hover, .sidebar a.active {
    color: var(--gold);
    background: rgba(212,175,55,0.05);
    border-left-color: var(--gold);
}
.main-content {
    flex: 1;
    padding: 30px;
    overflow-x: hidden;
}
.page-section { display: none; }
.page-section.active { display: block; }
.page-section h2 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 26px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}
/* STAT CARDS */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}
.stat-card {
    background: var(--card);
    border: 1px solid rgba(212,175,55,0.1);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
}
.stat-card .stat-number {
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
}
.stat-card .stat-label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
}
/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
}
th {
    background: rgba(212,175,55,0.1);
    color: var(--gold);
    padding: 12px 10px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid rgba(212,175,55,0.2);
}
td {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: #ddd;
}
tr:hover td { background: rgba(212,175,55,0.03); }
.table-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.table-actions button {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: 0.2s;
}
.btn-edit { background: var(--gold); color: #000; }
.btn-delete { background: var(--red); color: white; }
.btn-status { background: var(--green); color: white; }
.btn-edit:hover, .btn-delete:hover, .btn-status:hover { opacity: 0.8; }
/* FORMS */
.form-group { margin-bottom: 16px; }
.form-group label {
    display: block;
    margin-bottom: 5px;
    color: var(--muted);
    font-size: 13px;
}
.form-group input, .form-group textarea, .form-group select {
    width: 100%;
    max-width: 400px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(212,175,55,0.2);
    background: #111;
    color: white;
    font-size: 14px;
    outline: none;
    font-family: 'Poppins', sans-serif;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--gold); }
.form-group textarea { min-height: 60px; resize: vertical; }
.form-row { display: flex; gap: 16px; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 150px; }
.btn-save {
    padding: 12px 30px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}
.btn-save:hover { background: #f1cb55; }
/* ORDERS */
.order-card {
    background: var(--card);
    border: 1px solid rgba(212,175,55,0.1);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
}
.order-card .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
}
.order-card .order-id { font-weight: 600; color: var(--gold); }
.order-card .order-date { font-size: 12px; color: var(--muted); }
.order-card .order-status {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}
.status-pending { background: rgba(212,175,55,0.2); color: var(--gold); }
.status-completed { background: rgba(39,174,96,0.2); color: var(--green); }
.status-cancelled { background: rgba(231,76,60,0.2); color: var(--red); }
.order-card .order-items { margin: 10px 0; }
.order-card .order-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}
.order-card .order-total {
    font-size: 16px;
    font-weight: 600;
    color: var(--gold);
    margin-top: 8px;
    text-align: right;
}
.order-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.order-actions select {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(212,175,55,0.3);
    background: #111;
    color: white;
    font-size: 13px;
    outline: none;
}
.order-actions button {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    background: var(--gold);
    color: #000;
    transition: 0.2s;
}
.order-actions button:hover { opacity: 0.8; }
.empty-msg { color: var(--muted); font-style: italic; padding: 20px 0; }
/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(212,175,55,0.1); padding: 15px 0; }
    .sidebar h2 { padding: 0 15px 12px; }
    .sidebar a { display: inline-block; padding: 8px 14px; border-left: none; border-bottom: 2px solid transparent; font-size: 13px; }
    .sidebar a:hover, .sidebar a.active { border-left: none; border-bottom-color: var(--gold); }
    .admin-layout { flex-direction: column; }
    .main-content { padding: 20px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-row .form-group { min-width: 100%; }
}
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
}
/* LOGOUT */
.logout-btn {
    display: block;
    margin: 30px 20px 0;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    transition: 0.3s;
}
.logout-btn:hover { background: var(--red); color: white; }
@media (max-width: 768px) {
    .logout-btn { display: inline-block; margin: 10px; }
}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <h1>🔐 JAHA ADMIN</h1>
    <input type="password" id="adminPass" placeholder="Admin şifresi" autocomplete="off" />
    <button onclick="adminLogin()">Giriş Yap</button>
    <div id="loginError" class="login-error">Hatalı şifre!</div>
    <a href="index.html" style="color: var(--muted); font-size: 13px; text-decoration: none;">← Ana Sayfaya Dön</a>
</div>

<div id="adminPanel" class="admin-layout hidden">
    <nav class="sidebar">
        <h2>JAHA ADMIN</h2>
        <a href="#" class="active" onclick="showPage('dashboard',this)">📊 Dashboard</a>
        <a href="#" onclick="showPage('products',this)">📦 Ürünler</a>
        <a href="#" onclick="showPage('orders',this)">📋 Siparişler</a>
        <a href="index.html" style="margin-top:20px;border-left-color:var(--gold);color:var(--gold);">← Siteye Dön</a>
        <button class="logout-btn" onclick="adminLogout()">Çıkış Yap</button>
    </nav>
    <div class="main-content">

        <!-- DASHBOARD -->
        <div id="page-dashboard" class="page-section active">
            <h2>📊 Dashboard</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid rgba(212,175,55,0.1)">
                <h3 style="color:var(--gold);margin-bottom:12px;font-family:'Cinzel',serif;">Son Siparişler</h3>
                <div id="recentOrders"></div>
            </div>
        </div>

        <!-- PRODUCTS -->
        <div id="page-products" class="page-section">
            <h2>📦 Ürün Yönetimi</h2>
            <div style="background:var(--card);border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid rgba(212,175,55,0.1)">
                <h3 style="color:var(--gold);margin-bottom:16px;font-family:'Cinzel',serif;" id="formTitle">Yeni Ürün Ekle</h3>
                <input type="hidden" id="editProductId" value="" />
                <div class="form-row">
                    <div class="form-group"><label>Ürün Adı (TR)</label><input type="text" id="prodNameTr" placeholder="Örn: JAHA GENTLEMAN" /></div>
                    <div class="form-group"><label>Ürün Adı (AR)</label><input type="text" id="prodNameAr" placeholder="Örn: JAHA GENTLEMAN" /></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Açıklama (TR)</label><textarea id="prodDescTr" placeholder="Türkçe açıklama"></textarea></div>
                    <div class="form-group"><label>Açıklama (AR)</label><textarea id="prodDescAr" placeholder="Arapça açıklama"></textarea></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Fiyat (₺)</label><input type="number" id="prodPrice" placeholder="1200" /></div>
                    <div class="form-group"><label>Görsel Yolu</label><input type="text" id="prodImage" placeholder="perfume project/..." value="perfume project/JAHA Bottle 1.jpeg" /></div>
                    <div class="form-group" style="min-width:80px"><label>Stok (Adet)</label><input type="number" id="prodStock" placeholder="10" value="10" /></div>
                    <div class="form-group"><label>Sayfa</label>
                        <select id="prodPage">
                            <option value="index">Ana Sayfa</option>
                            <option value="luxury">Lüks Sayfası</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Kategori</label>
                        <select id="prodCategory">
                            <option value="">Genel</option>
                            <option value="Özel Seri">Özel Seri</option>
                            <option value="Limitli Üretim">Limitli Üretim</option>
                            <option value="Klasikler">Klasikler</option>
                        </select>
                    </div>
                </div>
                <button class="btn-save" onclick="saveProduct()">Ürünü Kaydet</button>
                <button style="margin-left:10px;padding:12px 20px;background:transparent;border:1px solid var(--muted);color:var(--muted);border-radius:30px;cursor:pointer;font-size:13px;display:none" id="cancelEditBtn" onclick="cancelEdit()">İptal</button>
            </div>
            <table id="productsTable">
                <thead><tr><th>ID</th><th>Ad</th><th>Fiyat</th><th>Stok</th><th>Sayfa</th><th>Kategori</th><th>İşlem</th></tr></thead>
                <tbody id="productsBody"></tbody>
            </table>
        </div>

        <!-- ORDERS -->
        <div id="page-orders" class="page-section">
            <h2>📋 Siparişler</h2>
            <div id="ordersList"></div>
        </div>

    </div>
</div>

<script>
const ADMIN_PASSWORD = 'jaha2026';
const STORAGE_PRODUCTS = 'jahaAdminProducts';
const STORAGE_ORDERS = 'jahaAdminOrders';

// --- LOGIN ---
function adminLogin() {
    const pass = document.getElementById('adminPass').value;
    if (pass === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('loginError').style.display = 'none';
        loadAll();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}
function adminLogout() {
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminPass').value = '';
}

// --- NAV ---
function showPage(page, el) {
    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (el) el.classList.add('active');
}

// --- DATA ---
function getProducts() {
    let data = localStorage.getItem(STORAGE_PRODUCTS);
    if (!data) {
        data = defaultProducts();
        localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(data));
    }
    return JSON.parse(data);
}
function saveProductsToStore(products) {
    localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
}
function getOrders() {
    let data = localStorage.getItem(STORAGE_ORDERS);
    return data ? JSON.parse(data) : [];
}
function saveOrdersToStore(orders) {
    localStorage.setItem(STORAGE_ORDERS, JSON.stringify(orders));
}

function defaultProducts() {
    return [
        { id: 'p1', nameTr: 'JAHA GENTLEMAN', nameAr: 'JAHA GENTLEMAN', descTr: 'Odunsu notalar ve karabiberin maskülen ve keskin birleşimi.', descAr: 'مزيج ذكوري وحاد من الملاحظات الخشبية والفلفل الأسود.', price: 1200, stock: 10, image: 'perfume project/JAHA Bottle 1.jpeg', page: 'index', category: '' },
        { id: 'p2', nameTr: 'JAHA ROSE', nameAr: 'JAHA ROSE نسائي', descTr: 'İpeksi gül yaprakları ve beyaz miskin büyüleyici zarafeti.', descAr: 'الأناقة الساحرة لبتلات الورد الحريرية والمسك الأبيض.', price: 1200, stock: 10, image: 'perfume project/JAHA Bottle 1.jpeg', page: 'index', category: '' },
        { id: 'p3', nameTr: 'JAHA TITAN', nameAr: 'JAHA TITAN', descTr: 'Güçlü ve kalıcı etkisiyle modern erkeğin tercihi.', descAr: 'خيار الرجل العصري بتأثيره القوي والطويل الأمد.', price: 1200, stock: 10, image: 'perfume project/JAHA Bottle 1.jpeg', page: 'index', category: '' },
        { id: 'p4', nameTr: 'JAHA Al HAYBA', nameAr: 'JAHA Al HAYBA', descTr: 'Doğu\'nun gizemli esanslarıyla büyüleyici bir deneyim.', descAr: 'تجربة ساحرة مع خلاصات الشرق الغامضة.', price: 1200, stock: 10, image: 'perfume project/JAHA Bottle 1.jpeg', page: 'luxury', category: 'Özel Seri' },
        { id: 'p5', nameTr: 'JAHA STORM', nameAr: 'JAHA STORM', descTr: 'Taze ve dinamik notalarla enerjinizi yükseltin.', descAr: 'ارفع طاقتك بنفحات منعشة وديناميكية.', price: 1200, stock: 10, image: 'perfume project/JAHA Bottle 1.jpeg', page: 'luxury', category: 'Özel Seri' }
    ];
}

// --- DASHBOARD ---
function renderDashboard() {
    const products = getProducts();
    const orders = getOrders();
    const totalProducts = products.length;
    const totalOrders = orders.length;
    let totalRevenue = 0;
    let pendingCount = 0;
    orders.forEach(o => {
        if (o.status === 'completed' || o.status === 'teslim edildi') totalRevenue += o.total || 0;
        if (o.status === 'pending' || o.status === 'bekliyor') pendingCount++;
    });

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-number">${totalProducts}</div><div class="stat-label">Toplam Ürün</div></div>
        <div class="stat-card"><div class="stat-number">${totalOrders}</div><div class="stat-label">Toplam Sipariş</div></div>
        <div class="stat-card"><div class="stat-number">${pendingCount}</div><div class="stat-label">Bekleyen Sipariş</div></div>
        <div class="stat-card"><div class="stat-number">${totalRevenue.toLocaleString()} ₺</div><div class="stat-label">Toplam Gelir</div></div>
    `;

    const recent = orders.slice(-5).reverse();
    let html = '';
    if (recent.length === 0) {
        html = '<div class="empty-msg">Henüz sipariş yok.</div>';
    } else {
        html = '<table><thead><tr><th>Sipariş</th><th>Tarih</th><th>Tutar</th><th>Durum</th></tr></thead><tbody>';
        recent.forEach(o => {
            html += `<tr><td style="color:var(--gold)">#${o.id}</td><td style="font-size:12px;color:var(--muted)">${o.date || '-'}</td><td>${(o.total || 0).toLocaleString()} ₺</td><td><span class="order-status status-${o.status === 'completed' || o.status === 'teslim edildi' ? 'completed' : o.status === 'cancelled' || o.status === 'iptal' ? 'cancelled' : 'pending'}">${o.status || 'bekliyor'}</span></td></tr>`;
        });
        html += '</tbody></table>';
    }
    document.getElementById('recentOrders').innerHTML = html;
}

// --- PRODUCTS ---
function renderProducts() {
    const products = getProducts();
    let html = '';
    products.forEach(p => {
            const stock = p.stock !== undefined ? p.stock : 10;
            const stockColor = stock <= 0 ? 'var(--red)' : stock <= 3 ? 'var(--gold)' : 'var(--green)';
            html += `<tr>
            <td>${p.id}</td>
            <td>${p.nameTr}</td>
            <td>${p.price} ₺</td>
            <td style="color:${stockColor};font-weight:600">${stock}</td>
            <td>${p.page === 'luxury' ? 'Lüks' : 'Ana Sayfa'}</td>
            <td style="color:var(--muted);font-size:12px">${p.category || '-'}</td>
            <td class="table-actions">
                <button class="btn-edit" onclick="editProduct('${p.id}')">✏️ Düzenle</button>
                <button class="btn-delete" onclick="deleteProduct('${p.id}')">🗑️ Sil</button>
            </td>
        </tr>`;
    });
    document.getElementById('productsBody').innerHTML = html || '<tr><td colspan="5" class="empty-msg">Henüz ürün yok.</td></tr>';
}

function saveProduct() {
    const editId = document.getElementById('editProductId').value;
    const nameTr = document.getElementById('prodNameTr').value.trim();
    const nameAr = document.getElementById('prodNameAr').value.trim();
    const descTr = document.getElementById('prodDescTr').value.trim();
    const descAr = document.getElementById('prodDescAr').value.trim();
    const price = parseInt(document.getElementById('prodPrice').value);
    const stock = parseInt(document.getElementById('prodStock').value) || 0;
    const image = document.getElementById('prodImage').value.trim() || 'perfume project/JAHA Bottle 1.jpeg';
    const page = document.getElementById('prodPage').value;
    const category = document.getElementById('prodCategory').value;

    if (!nameTr || !price) { alert('Ürün adı ve fiyat zorunludur!'); return; }

    let products = getProducts();
    if (editId) {
        const idx = products.findIndex(p => p.id === editId);
        if (idx > -1) {
            products[idx] = { ...products[idx], nameTr, nameAr, descTr, descAr, price, stock, image, page, category };
        }
    } else {
        const newId = 'p' + Date.now();
        products.push({ id: newId, nameTr, nameAr, descTr, descAr, price, stock, image, page, category });
    }
    saveProductsToStore(products);
    cancelEdit();
    renderProducts();
    renderDashboard();
}

function editProduct(id) {
    const products = getProducts();
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editProductId').value = p.id;
    document.getElementById('prodNameTr').value = p.nameTr;
    document.getElementById('prodNameAr').value = p.nameAr || '';
    document.getElementById('prodDescTr').value = p.descTr || '';
    document.getElementById('prodDescAr').value = p.descAr || '';
    document.getElementById('prodPrice').value = p.price;
    document.getElementById('prodStock').value = p.stock !== undefined ? p.stock : 10;
    document.getElementById('prodImage').value = p.image || '';
    document.getElementById('prodPage').value = p.page || 'index';
    document.getElementById('prodCategory').value = p.category || '';
    document.getElementById('formTitle').textContent = '✏️ Ürünü Düzenle';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
    document.getElementById('editProductId').value = '';
    document.getElementById('prodNameTr').value = '';
    document.getElementById('prodNameAr').value = '';
    document.getElementById('prodDescTr').value = '';
    document.getElementById('prodDescAr').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodStock').value = '10';
    document.getElementById('prodImage').value = 'perfume project/JAHA Bottle 1.jpeg';
    document.getElementById('prodPage').value = 'index';
    document.getElementById('prodCategory').value = '';
    document.getElementById('formTitle').textContent = 'Yeni Ürün Ekle';
    document.getElementById('cancelEditBtn').style.display = 'none';
}

function deleteProduct(id) {
    if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
    let products = getProducts().filter(p => p.id !== id);
    saveProductsToStore(products);
    renderProducts();
    renderDashboard();
}

// --- ORDERS ---
function renderOrders() {
    const orders = getOrders();
    const container = document.getElementById('ordersList');
    if (orders.length === 0) {
        container.innerHTML = '<div class="empty-msg">Henüz sipariş alınmadı.</div>';
        return;
    }
    let html = '';
    orders.slice().reverse().forEach(o => {
        const statusClass = o.status === 'completed' || o.status === 'teslim edildi' ? 'completed' : o.status === 'cancelled' || o.status === 'iptal' ? 'cancelled' : 'pending';
        let itemsHtml = '';
        (o.items || []).forEach(item => {
            itemsHtml += `<div class="order-item"><span>${item.name || item}</span><span>${item.price || ''}</span></div>`;
        });
        if (!itemsHtml) itemsHtml = '<div class="empty-msg">Ürün bilgisi yok</div>';
        html += `<div class="order-card">
            <div class="order-header">
                <span><span class="order-id">#${o.id}</span> <span class="order-date">${o.date || '-'}</span></span>
                <span class="order-status status-${statusClass}">${o.status || 'bekliyor'}</span>
            </div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:8px">
                ${o.customerName ? '👤 ' + o.customerName : ''} ${o.phone ? '📞 ' + o.phone : ''} ${o.email ? '✉️ ' + o.email : ''}
                ${o.city ? '📍 ' + o.city + '/' + (o.district||'') : ''}
            </div>
            ${o.address ? '<div style="font-size:12px;color:var(--muted);margin-bottom:4px">🏠 ' + o.address + (o.postalCode ? ' (' + o.postalCode + ')' : '') + '</div>' : ''}
            <div class="order-items">${itemsHtml}</div>
            <div class="order-total">Toplam: ${(o.total || 0).toLocaleString()} ₺</div>
            <div class="order-actions">
                <select id="statusSelect_${o.id}">
                    <option value="bekliyor" ${o.status === 'bekliyor' ? 'selected' : ''}>Bekliyor</option>
                    <option value="hazırlanıyor" ${o.status === 'hazırlanıyor' ? 'selected' : ''}>Hazırlanıyor</option>
                    <option value="kargoda" ${o.status === 'kargoda' ? 'selected' : ''}>Kargoda</option>
                    <option value="teslim edildi" ${o.status === 'teslim edildi' ? 'selected' : ''}>Teslim Edildi</option>
                    <option value="iptal" ${o.status === 'iptal' ? 'selected' : ''}>İptal</option>
                </select>
                <button onclick="updateOrderStatus('${o.id}')">Güncelle</button>
                <button style="background:var(--red);color:white" onclick="deleteOrder('${o.id}')">🗑️ Sil</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function updateOrderStatus(id) {
    const status = document.getElementById('statusSelect_' + id).value;
    let orders = getOrders();
    const idx = orders.findIndex(o => o.id === id);
    if (idx > -1) {
        orders[idx].status = status;
        saveOrdersToStore(orders);
        renderOrders();
        renderDashboard();
    }
}

function deleteOrder(id) {
    if (!confirm('Bu siparişi silmek istediğinize emin misiniz?')) return;
    let orders = getOrders().filter(o => o.id !== id);
    saveOrdersToStore(orders);
    renderOrders();
    renderDashboard();
}

// --- Karttan sepetteki siparişleri admin'e aktar ---
function syncOrdersFromCart() {
    try {
        const cart = JSON.parse(localStorage.getItem('jahaCart')) || [];
        if (cart.length === 0) return;
        let orders = getOrders();
        // Her sepet kaydını bir sipariş olarak ekle
        let total = 0;
        const items = cart.map(item => {
            const price = item.priceNum || parseInt(String(item.price || '0').replace(/[^\d]/g, '')) || 0;
            const qty = item.quantity || 1;
            total += price * qty;
            return { name: item.name, price: (price * qty) + ' ₺' };
        });
        const newOrder = {
            id: 'ORD' + Date.now(),
            date: new Date().toLocaleString('tr-TR'),
            status: 'bekliyor',
            items: items,
            total: total,
            customerName: '',
            phone: '',
            email: ''
        };
        orders.push(newOrder);
        saveOrdersToStore(orders);
        localStorage.removeItem('jahaCart');
    } catch(e) {}
}

function loadAll() {
    renderDashboard();
    renderProducts();
    renderOrders();
}

// Enter ile login
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('adminPass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') adminLogin();
    });
});
</script>
