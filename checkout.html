<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JAHA PERFUME'S | Sipariş Ekranı</title>
<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="media%20ph/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="media%20ph/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="media%20ph/favicon-16x16.png">
<link rel="manifest" href="media%20ph/site.webmanifest">
<link rel="shortcut icon" href="media%20ph/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #d4af37;
        --black: #050505;
        --card: #111111;
        --text: #f5f5f5;
        --input-bg: #1a1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif;
        background: var(--black);
        color: var(--text);
        padding: 50px 20px;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        background: var(--card);
        padding: 40px;
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
        font-family: 'Cinzel', serif;
        color: var(--gold);
        text-align: center;
        margin-bottom: 30px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #bbb;
    }
    input, select, textarea {
        width: 100%;
        padding: 12px 15px;
        background: var(--input-bg);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 8px;
        color: white;
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 10px rgba(212,175,55,0.2);
    }
    .row {
        display: flex;
        gap: 15px;
    }
    .row .form-group {
        flex: 1;
    }
    .whatsapp-btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin-top: 30px;
        background: linear-gradient(145deg, #d4af37, #8f6b10);
        color: black;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }
    .whatsapp-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212,175,55,0.3);
    }
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: var(--gold);
        text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    textarea {
        resize: vertical;
        min-height: 100px;
    }
    
    @media (max-width: 600px) {
        .row {
            flex-direction: column;
            gap: 0;
        }
    }
</style>
</head>
<body>

<div class="container">
    <a href="sepet.html" class="back-link">← Sepete Dön</a>
    <h1>Teslimat Bilgileri</h1>
    
    <form id="checkoutForm">
        <div class="form-group">
            <label for="fullname">Ad Soyad *</label>
            <input type="text" id="fullname" required placeholder="Örn: Ahmet Yılmaz">
        </div>

        <div class="form-group">
            <label for="phone">Telefon *</label>
            <input type="tel" id="phone" required placeholder="Örn: 0555 555 55 55">
        </div>

        <div class="row">
            <div class="form-group">
                <label for="city">İl *</label>
                <select id="city" required>
                    <option value="">Seçiniz...</option>
                    <option value="Adana">Adana</option><option value="Adıyaman">Adıyaman</option><option value="Afyonkarahisar">Afyonkarahisar</option><option value="Ağrı">Ağrı</option><option value="Amasya">Amasya</option><option value="Ankara">Ankara</option><option value="Antalya">Antalya</option><option value="Artvin">Artvin</option><option value="Aydın">Aydın</option><option value="Balıkesir">Balıkesir</option><option value="Bilecik">Bilecik</option><option value="Bingöl">Bingöl</option><option value="Bitlis">Bitlis</option><option value="Bolu">Bolu</option><option value="Burdur">Burdur</option><option value="Bursa">Bursa</option><option value="Çanakkale">Çanakkale</option><option value="Çankırı">Çankırı</option><option value="Çorum">Çorum</option><option value="Denizli">Denizli</option><option value="Diyarbakır">Diyarbakır</option><option value="Edirne">Edirne</option><option value="Elazığ">Elazığ</option><option value="Erzincan">Erzincan</option><option value="Erzurum">Erzurum</option><option value="Eskişehir">Eskişehir</option><option value="Gaziantep">Gaziantep</option><option value="Giresun">Giresun</option><option value="Gümüşhane">Gümüşhane</option><option value="Hakkari">Hakkari</option><option value="Hatay">Hatay</option><option value="Isparta">Isparta</option><option value="Mersin">Mersin</option><option value="İstanbul">İstanbul</option><option value="İzmir">İzmir</option><option value="Kars">Kars</option><option value="Kastamonu">Kastamonu</option><option value="Kayseri">Kayseri</option><option value="Kırklareli">Kırklareli</option><option value="Kırşehir">Kırşehir</option><option value="Kocaeli">Kocaeli</option><option value="Konya">Konya</option><option value="Kütahya">Kütahya</option><option value="Malatya">Malatya</option><option value="Manisa">Manisa</option><option value="Kahramanmaraş">Kahramanmaraş</option><option value="Mardin">Mardin</option><option value="Muğla">Muğla</option><option value="Muş">Muş</option><option value="Nevşehir">Nevşehir</option><option value="Niğde">Niğde</option><option value="Ordu">Ordu</option><option value="Rize">Rize</option><option value="Sakarya">Sakarya</option><option value="Samsun">Samsun</option><option value="Siirt">Siirt</option><option value="Sinop">Sinop</option><option value="Sivas">Sivas</option><option value="Tekirdağ">Tekirdağ</option><option value="Tokat">Tokat</option><option value="Trabzon">Trabzon</option><option value="Tunceli">Tunceli</option><option value="Şanlıurfa">Şanlıurfa</option><option value="Uşak">Uşak</option><option value="Van">Van</option><option value="Yozgat">Yozgat</option><option value="Zonguldak">Zonguldak</option><option value="Aksaray">Aksaray</option><option value="Bayburt">Bayburt</option><option value="Karaman">Karaman</option><option value="Kırıkkale">Kırıkkale</option><option value="Batman">Batman</option><option value="Şırnak">Şırnak</option><option value="Bartın">Bartın</option><option value="Ardahan">Ardahan</option><option value="Iğdır">Iğdır</option><option value="Yalova">Yalova</option><option value="Karabük">Karabük</option><option value="Kilis">Kilis</option><option value="Osmaniye">Osmaniye</option><option value="Düzce">Düzce</option>
                </select>
            </div>
            <div class="form-group">
                <label for="district">İlçe *</label>
                <input type="text" id="district" required placeholder="Örn: Kadıköy">
            </div>
        </div>

        <div class="form-group">
            <label for="address">Tam Adres *</label>
            <textarea id="address" required placeholder="Mahalle, sokak, bina ve daire no..."></textarea>
        </div>

        <div class="form-group">
            <label for="postalCode">Posta Kodu *</label>
            <input type="text" id="postalCode" required placeholder="Örn: 34000">
        </div>

        <button type="submit" class="whatsapp-btn">Siparişi Onayla (WhatsApp'a Git)</button>
    </form>
</div>

<script>
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();

        let cart = JSON.parse(localStorage.getItem('jahaCart')) || [];
        if (cart.length === 0) {
            alert("Sepetiniz boş. Lütfen önce ürün ekleyin.");
            window.location.href = "luxury.html";
            return;
        }

        const fullname = document.getElementById('fullname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const city = document.getElementById('city').value;
        const district = document.getElementById('district').value.trim();
        const address = document.getElementById('address').value.trim();
        const postalCode = document.getElementById('postalCode').value.trim();

        let total = 0;
        let productsText = "";
        const orderItems = [];
        cart.forEach((product, index) => {
            const itemTotal = product.priceNum * product.quantity;
            total += itemTotal;
            orderItems.push({ name: product.name, price: product.priceNum + ' ₺', quantity: product.quantity });
            productsText += `${index + 1}. *${product.quantity} adet* ${product.name}\n   _Fiyat: ${product.priceNum} ₺ x ${product.quantity} = ${itemTotal} ₺_\n\n`;
        });

        // Admin paneline kaydet
        const ordersKey = 'jahaAdminOrders';
        let orders = JSON.parse(localStorage.getItem(ordersKey)) || [];
        orders.push({
            id: 'ORD' + Date.now(),
            date: new Date().toLocaleString('tr-TR'),
            status: 'bekliyor',
            items: orderItems,
            total: total,
            customerName: fullname,
            phone: phone,
            city: city,
            district: district,
            address: address,
            postalCode: postalCode
        });
        localStorage.setItem(ordersKey, JSON.stringify(orders));

        // Sepeti temizle
        localStorage.removeItem('jahaCart');

        // WhatsApp Mesajı
        let message = "🧾 *JAHA PERFUME'S - SİPARİŞ DETAYLARI*\n";
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n";
        message += `📅 *Tarih:* ${new Date().toLocaleDateString('tr-TR')} ${new Date().toLocaleTimeString('tr-TR')}\n`;
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
        
        message += "👤 *MÜŞTERİ BİLGİLERİ:*\n";
        message += `▪️ *Ad Soyad:* ${fullname}\n`;
        message += `▪️ *Telefon:* ${phone}\n`;
        message += `▪️ *İl / İlçe:* ${city} / ${district}\n`;
        message += `▪️ *Posta Kodu:* ${postalCode}\n`;
        message += `▪️ *Adres:* ${address}\n\n`;
        
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
        message += "📦 *SİPARİŞ EDİLEN ÜRÜNLER:*\n\n";
        message += productsText;
        
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n";
        message += `💰 *TOPLAM TUTAR:* *${total} ₺*\n`;
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
        message += "Merhaba, yukarıdaki bilgiler doğrultusunda siparişimi onaylamak istiyorum. Yardımcı olabilir misiniz?";

        const encodedMessage = encodeURIComponent(message);
        window.open(`https://wa.me/905515101339?text=${encodedMessage}`, '_blank');

        alert('Siparişiniz alındı! WhatsApp yönlendiriliyorsunuz.');
        window.location.href = 'luxury.html';
    });
</script>

</body>
</html>
