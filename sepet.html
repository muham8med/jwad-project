<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JAHA PERFUME'S | Sepetim</title>

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="media%20ph/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="media%20ph/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="media%20ph/favicon-16x16.png">
<link rel="manifest" href="media%20ph/site.webmanifest">
<link rel="shortcut icon" href="media%20ph/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #d4af37;
        --black: #050505;
        --card: #111111;
        --text: #f5f5f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif;
        background: var(--black);
        color: var(--text);
        padding: 50px 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--card);
        padding: 40px;
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
        font-family: 'Cinzel', serif;
        color: var(--gold);
        text-align: center;
        margin-bottom: 30px;
    }
    .cart-list {
        list-style: none;
        margin-bottom: 30px;
    }
    .empty-cart-msg {
        text-align: center;
        color: #999;
        font-style: italic;
        padding: 20px 0;
    }
    .checkout-btn {
        display: block;
        width: 100%;
        padding: 15px;
        background: linear-gradient(145deg, #d4af37, #8f6b10);
        color: black;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }
    .checkout-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212,175,55,0.3);
    }
    .clear-btn {
        display: block;
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: transparent;
        color: #ff4c4c;
        border: 1px solid #ff4c4c;
        border-radius: 30px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .clear-btn:hover {
        background: #ff4c4c;
        color: white;
    }
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: var(--gold);
        text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .cart-total {
        margin-top: 20px;
        margin-bottom: 30px;
        text-align: right;
        font-size: 20px;
        color: var(--gold);
        border-top: 1px solid rgba(212,175,55,0.2);
        padding-top: 15px;
        letter-spacing: 1px;
    }
    .cart-total strong {
        font-size: 24px;
        color: #fff;
        margin-left: 10px;
    }

    /* Yeni Sepet Öğesi Stilleri */
    .cart-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid rgba(212,175,55,0.1);
        font-size: 16px;
    }
    .cart-item-img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        border-radius: 8px;
        background: #1a1a1a;
        margin-right: 15px;
        border: 1px solid rgba(212,175,55,0.2);
    }
    .cart-item-info {
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    .cart-item-name {
        font-weight: 600;
        color: var(--gold);
        margin-bottom: 5px;
    }
    .cart-item-price {
        font-size: 14px;
        color: #bbb;
    }
    .qty-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-right: 20px;
    }
    .qty-btn {
        width: 30px;
        height: 30px;
        border-radius: 5px;
        background: var(--gold);
        color: black;
        border: none;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .qty-btn:hover {
        background: #f1cb55;
    }
    .qty-number {
        font-weight: bold;
        width: 20px;
        text-align: center;
    }
    .item-total-price {
        font-weight: 600;
        min-width: 80px;
        text-align: right;
    }

    @media (max-width: 600px) {
        .cart-item {
            flex-direction: column;
            align-items: flex-start;
        }
        .qty-controls {
            margin: 15px 0;
        }
        .item-total-price {
            align-self: flex-end;
        }
    }
</style>
</head>
<body>

<div class="container">
    <a href="luxury" class="back-link">← Alışverişe Dön</a>
    <h1>Sepetiniz</h1>
    
    <ul id="cartItems" class="cart-list">
        <!-- Sepet öğeleri buraya yüklenecek -->
    </ul>

    <div id="cartTotal" class="cart-total">Toplam Tutar: <strong>0 ₺</strong></div>

    <button id="checkoutBtn" class="checkout-btn">Siparişi Onayla</button>
    <button id="clearCartBtn" class="clear-btn">Sepeti Temizle</button>
</div>

<script>
    let rawCart = JSON.parse(localStorage.getItem('jahaCart')) || [];
    
    // Eski/Yeni cart veri formatını normalize et (quantity ve image eksiklerini tamamla)
    let cart = [];
    rawCart.forEach(item => {
        const existing = cart.find(n => n.name === item.name);
        if (existing) {
            existing.quantity += (item.quantity || 1);
        } else {
            let priceVal = item.priceNum;
            if (!priceVal) {
                priceVal = parseInt((item.price || "1000").replace(/[^\d]/g, '')) || 1000;
            }
            cart.push({
                name: item.name,
                priceNum: priceVal,
                image: item.image || "perfume project/JAHA Bottle 1.jpeg",
                quantity: item.quantity || 1
            });
        }
    });
    localStorage.setItem('jahaCart', JSON.stringify(cart)); // Normalize edilmiş halini kaydet

    const cartItemsContainer = document.getElementById('cartItems');
    const cartTotalContainer = document.getElementById('cartTotal');

    function renderCart() {
        cartItemsContainer.innerHTML = '';
        
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<li class="empty-cart-msg">Sepetiniz şu an boş.</li>';
            cartTotalContainer.innerHTML = 'Toplam Tutar: <strong>0 ₺</strong>';
            return;
        }

        let total = 0;

        cart.forEach((product, index) => {
            const itemTotal = product.priceNum * product.quantity;
            total += itemTotal;

            const li = document.createElement('li');
            li.className = 'cart-item';
            
            li.innerHTML = `
                <div style="display:flex; align-items:center; flex:1; width: 100%;">
                    <img src="${product.image}" class="cart-item-img" alt="${product.name}">
                    <div class="cart-item-info">
                        <span class="cart-item-name">${product.name}</span>
                        <span class="cart-item-price">${product.priceNum} ₺</span>
                    </div>
                </div>
                
                <div style="display:flex; align-items:center; justify-content:space-between; width:100%; margin-top:10px;">
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                        <span class="qty-number">${product.quantity}</span>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    </div>

                    <div class="item-total-price">
                        ${itemTotal} ₺
                    </div>
                </div>
            `;
            cartItemsContainer.appendChild(li);
        });

        cartTotalContainer.innerHTML = `Toplam Tutar: <strong>${total} ₺</strong>`;
    }

    // Miktar Artırma / Azaltma Fonksiyonu
    window.updateQty = function(index, change) {
        if (cart[index]) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1); // Adet 0 olursa ürünü sepetten çıkar
            }
            localStorage.setItem('jahaCart', JSON.stringify(cart));
            renderCart();
        }
    };

    renderCart();

    // Sepeti Temizle Butonu
    document.getElementById('clearCartBtn').addEventListener('click', () => {
        localStorage.removeItem('jahaCart');
        cart = [];
        renderCart();
    });

    // Ödeme / Fatura Adımına Geçiş
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (cart.length === 0) {
            alert("Sipariş vermek için önce sepetinize ürün eklemelisiniz.");
            return;
        }
        window.location.href = 'checkout.html';
    });
</script>

</body>
</html>
