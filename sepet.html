<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JAHA PERFUME'S | Sepetim</title>

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="media%20ph/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="media%20ph/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="media%20ph/favicon-16x16.png">
<link rel="manifest" href="media%20ph/site.webmanifest">
<link rel="shortcut icon" href="media%20ph/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #d4af37;
        --black: #050505;
        --card: #111111;
        --text: #f5f5f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif;
        background: var(--black);
        color: var(--text);
        padding: 50px 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--card);
        padding: 40px;
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
        font-family: 'Cinzel', serif;
        color: var(--gold);
        text-align: center;
        margin-bottom: 30px;
    }
    .cart-list {
        list-style: none;
        margin-bottom: 30px;
    }
    .cart-list li {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid rgba(212,175,55,0.1);
        font-size: 16px;
    }
    .empty-cart-msg {
        text-align: center;
        color: #999;
        font-style: italic;
    }
    .whatsapp-btn {
        display: block;
        width: 100%;
        padding: 15px;
        background: linear-gradient(145deg, #d4af37, #8f6b10);
        color: black;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }
    .whatsapp-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212,175,55,0.3);
    }
    .clear-btn {
        display: block;
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: transparent;
        color: #ff4c4c;
        border: 1px solid #ff4c4c;
        border-radius: 30px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .clear-btn:hover {
        background: #ff4c4c;
        color: white;
    }
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: var(--gold);
        text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .cart-total {
        margin-top: 20px;
        margin-bottom: 30px;
        text-align: right;
        font-size: 20px;
        color: var(--gold);
        border-top: 1px solid rgba(212,175,55,0.2);
        padding-top: 15px;
        letter-spacing: 1px;
    }
    .cart-total strong {
        font-size: 24px;
        color: #fff;
        margin-left: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <a href="luxury" class="back-link">← Alışverişe Dön</a>
    <h1>Sepetiniz</h1>
    
    <ul id="cartItems" class="cart-list">
        </ul>

    <div id="cartTotal" class="cart-total">Toplam Tutar: <strong>0 ₺</strong></div>

    <button id="whatsappOrderBtn" class="whatsapp-btn">Siparişi Tamamla (WhatsApp)</button>
    <button id="clearCartBtn" class="clear-btn">Sepeti Temizle</button>
</div>

<script>
    // 1. Sepet verisini localStorage'dan al
    let cart = JSON.parse(localStorage.getItem('jahaCart')) || [];
    const cartItemsContainer = document.getElementById('cartItems');
    const cartTotalContainer = document.getElementById('cartTotal');
    
    // 2. Sepet içeriğini gruplayacak yardımcı fonksiyon
    function getGroupedCart() {
        const grouped = {};
        cart.forEach(item => {
            const name = item.name.trim();
            // Fiyat bilgisini sayıya çevir
            let priceNum = parseInt(item.price.replace(/[^\d]/g, '')) || 1000;
            
            if (grouped[name]) {
                grouped[name].quantity += 1;
            } else {
                grouped[name] = {
                    name: name,
                    priceNum: priceNum,
                    quantity: 1
                };
            }
        });
        return grouped;
    }

    // 3. Sepet içeriğini ekrana yazdır
    function renderCart() {
        cartItemsContainer.innerHTML = '';
        
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<li class="empty-cart-msg">Sepetiniz şu an boş.</li>';
            cartTotalContainer.innerHTML = 'Toplam Tutar: <strong>0 ₺</strong>';
            return;
        }

        const grouped = getGroupedCart();
        let total = 0;
        let index = 1;

        for (const name in grouped) {
            const product = grouped[name];
            const itemTotal = product.priceNum * product.quantity;
            total += itemTotal;

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${index}. <strong>${product.quantity} adet</strong> ${product.name}</span> 
                <span>${itemTotal} ₺</span>
            `;
            cartItemsContainer.appendChild(li);
            index++;
        }

        cartTotalContainer.innerHTML = `Toplam Tutar: <strong>${total} ₺</strong>`;
    }

    renderCart();

    // 4. Sepeti Temizle Butonu
    document.getElementById('clearCartBtn').addEventListener('click', () => {
        localStorage.removeItem('jahaCart');
        cart = [];
        renderCart();
    });

    // 5. WhatsApp Sipariş Butonu (Tam Fatura Gibi Mesaj)
    document.getElementById('whatsappOrderBtn').addEventListener('click', () => {
        if (cart.length === 0) {
            alert("Sipariş vermek için önce sepetinize ürün eklemelisiniz.");
            return;
        }

        const grouped = getGroupedCart();
        let total = 0;

        // WhatsApp için profesyonel fatura formatı
        let message = "🧾 *JAHA PERFUME'S - SİPARİŞ DETAYLARI (FATURA)*\n";
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n";
        message += `📅 *Tarih:* ${new Date().toLocaleDateString('tr-TR')} ${new Date().toLocaleTimeString('tr-TR')}\n`;
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
        message += "📦 *SİPARİŞ EDİLEN ÜRÜNLER:*\n\n";
        
        let index = 1;
        for (const name in grouped) {
            const product = grouped[name];
            const itemTotal = product.priceNum * product.quantity;
            total += itemTotal;
            message += `${index}. *${product.quantity} adet* ${product.name}\n   _Fiyat: ${product.priceNum} ₺ x ${product.quantity} = ${itemTotal} ₺_\n\n`;
            index++;
        }
        
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n";
        message += `💰 *TOPLAM TUTAR:* *${total} ₺*\n`;
        message += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
        message += "Merhaba, yukarıdaki fatura detaylarına göre siparişimi oluşturmak istiyorum. Yardımcı olabilir misiniz?";

        // Mesajı URL formatına dönüştür (boşlukları %20 vb. yapar)
        const encodedMessage = encodeURIComponent(message);
        
        // WhatsApp numarası (Ülke kodu ile birlikte)
        const waNumber = "905515101339"; 
        
        // Yeni sekmede WhatsApp'ı aç
        window.open(`https://wa.me/${waNumber}?text=${encodedMessage}`, '_blank');
    });
</script>

</body>
</html>
