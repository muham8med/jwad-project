<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JAHA PERFUME'S | Sepetim</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #d4af37;
        --black: #050505;
        --card: #111111;
        --text: #f5f5f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif;
        background: var(--black);
        color: var(--text);
        padding: 50px 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--card);
        padding: 40px;
        border: 1px solid rgba(212,175,55,0.2);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
        font-family: 'Cinzel', serif;
        color: var(--gold);
        text-align: center;
        margin-bottom: 30px;
    }
    .cart-list {
        list-style: none;
        margin-bottom: 30px;
    }
    .cart-list li {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid rgba(212,175,55,0.1);
        font-size: 16px;
    }
    .empty-cart-msg {
        text-align: center;
        color: #999;
        font-style: italic;
    }
    .whatsapp-btn {
        display: block;
        width: 100%;
        padding: 15px;
        background: linear-gradient(145deg, #d4af37, #8f6b10);
        color: black;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }
    .whatsapp-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212,175,55,0.3);
    }
    .clear-btn {
        display: block;
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: transparent;
        color: #ff4c4c;
        border: 1px solid #ff4c4c;
        border-radius: 30px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .clear-btn:hover {
        background: #ff4c4c;
        color: white;
    }
    .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: var(--gold);
        text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <a href="luxury.html" class="back-link">← Alışverişe Dön</a>
    <h1>Sepetiniz</h1>
    
    <ul id="cartItems" class="cart-list">
        </ul>

    <button id="whatsappOrderBtn" class="whatsapp-btn">Siparişi Tamamla (WhatsApp)</button>
    <button id="clearCartBtn" class="clear-btn">Sepeti Temizle</button>
</div>

<script>
    // 1. Sepet verisini localStorage'dan al
    let cart = JSON.parse(localStorage.getItem('jahaCart')) || [];
    const cartItemsContainer = document.getElementById('cartItems');
    
    // 2. Sepet içeriğini ekrana yazdır
    function renderCart() {
        cartItemsContainer.innerHTML = '';
        
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<li class="empty-cart-msg">Sepetiniz şu an boş.</li>';
            return;
        }

        cart.forEach((item, index) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${index + 1}. ${item.name}</span> <span>${item.price}</span>`;
            cartItemsContainer.appendChild(li);
        });
    }

    renderCart();

    // 3. Sepeti Temizle Butonu
    document.getElementById('clearCartBtn').addEventListener('click', () => {
        localStorage.removeItem('jahaCart');
        cart = [];
        renderCart();
    });

    // 4. WhatsApp Sipariş Butonu
    document.getElementById('whatsappOrderBtn').addEventListener('click', () => {
        if (cart.length === 0) {
            alert("Sipariş vermek için önce sepetinize ürün eklemelisiniz.");
            return;
        }

        // WhatsApp mesajını oluştur
        let message = "Merhabalar, JAHA Perfume's web sitesinden şu ürünleri sipariş vermek istiyorum:\n\n";
        
        cart.forEach((item, index) => {
            message += `▪️ ${item.name} - ${item.price}\n`;
        });
        
        message += "\nSipariş işlemlerim için yardımcı olabilir misiniz?";

        // Mesajı URL formatına dönüştür (boşlukları %20 vb. yapar)
        const encodedMessage = encodeURIComponent(message);
        
        // WhatsApp numarası (Başına + koymadan, sadece ülke kodu ve numara)
        const waNumber = "905515101339"; 
        
        // Yeni sekmede WhatsApp'ı aç
        window.open(`https://wa.me/${waNumber}?text=${encodedMessage}`, '_blank');
        
        // İsteğe bağlı: Sipariş verildikten sonra sepeti otomatik temizlemek istersen alttaki 2 satırın başındaki // işaretini kaldır.
        // localStorage.removeItem('jahaCart');
        // renderCart();
    });
</script>

</body>
</html>
